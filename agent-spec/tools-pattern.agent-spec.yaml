# Canonical specification — the tools + handlers pattern.
#
# This is the reusable contract for every domain-specific example in the
# repo (osm-geocoder, noaa-weather, and future siblings). It defines the
# directory layout, CLI contract, shared-library split, handler-side
# shim, and cache conformance rules that make a domain pipeline
# scriptable, testable, and reusable from the FFL runtime.

identity:
  name: tools-pattern
  kind: system-contract
  version: 1

purpose: |
  One domain, one code path. A "tool" is a small shell/Python CLI that
  performs one step of a pipeline (download, convert, extract, render).
  An FFL "handler" is the step's runtime-invocable implementation.
  Both call into the same shared library (tools/_lib/). A developer
  reading the tool at the terminal and a workflow running in production
  exercise identical logic with identical cache effects — no drift
  between the two surfaces.

  Canonical examples in the repo:
    - examples/osm-geocoder/ (OSM ingestion → vector tiles → HTML maps)
    - https://github.com/rlemke/fwh_noaa_weather/ (NOAA GHCN ingestion → climate trends — standalone repo)

# ---------------------------------------------------------------------------
# Directory layout — every domain example under examples/<name>/.
# ---------------------------------------------------------------------------
layout:
  example_root: "examples/<domain-name>/"
  required_subdirs:
    tools:
      path: "examples/<domain-name>/tools/"
      description: "Standalone CLI tools + their shared library."
      contents:
        - "<tool>.py        (Python CLI — runnable directly)"
        - "<tool>.sh        (shell wrapper — sources .env + .venv, execs python)"
        - "_lib/            (shared library — see section below)"
        - "README.md        (pipeline diagram + per-tool summary; optional)"
    handlers:
      path: "examples/<domain-name>/handlers/"
      description: "FFL event-facet handlers — thin dispatchers."
      contents:
        - "<facet_group>/<group>_handlers.py  (handler modules)"
        - "shared/             (re-export shims that bridge to tools/_lib/)"
    ffl:
      path: "examples/<domain-name>/ffl/"
      description: "FFL definitions and the compiled registry JSON."
      contents:
        - "<name>.ffl        (the workflow + facet + schema definitions)"
        - "<name>.json       (compiled registry — output of afl CLI)"
    tests:
      path: "examples/<domain-name>/tests/"
      description: "pytest suite for handlers, _lib, and FFL compilation."

# ---------------------------------------------------------------------------
# The tool contract — what "a CLI tool" means here.
# ---------------------------------------------------------------------------
tool_contract:
  structure:
    - "Every tool is ONE Python file + ONE shell wrapper. No more, no less."
    - "The .py is runnable directly: `python tools/<name>.py --help` works."
    - "The .sh is a thin wrapper that sources scripts/_env.sh, activates .venv, then execs python3."
    - "Shell wrappers do NOT parse arguments — argparse is in the .py."

  python_cli:
    argparse:
      - "Use argparse. Module docstring duplicates the usage lines for --help."
      - "Tool name in the file matches the .sh (kebab-case) but uses snake_case for the .py (download_pbf.py / download-pbf.sh)."
    output_separation:
      - "stdout: structured output (JSON, CSV, region lists) intended for piping."
      - "stderr: human-readable log lines, progress, errors."
      - "This split is load-bearing — tools compose via pipes, and mixing channels breaks them."
    exit_codes:
      - "0 on success."
      - "Non-zero on failure. Errors go to stderr, never stdout."
    entrypoint:
      - "Module defines `main() -> int` returning the exit code."
      - "Guarded by `if __name__ == \"__main__\": sys.exit(main())`."
    logging:
      - "Use Python `logging` — default level INFO."
      - "Expose `--log-level` (default INFO) so the harness can dial it up/down."

  shell_wrapper:
    template: |
      #!/usr/bin/env bash
      set -euo pipefail
      SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
      REPO_ROOT="$(cd "${SCRIPT_DIR}/../../.." && pwd)"
      [ -f "${REPO_ROOT}/scripts/_env.sh" ] && source "${REPO_ROOT}/scripts/_env.sh"
      [ -f "${REPO_ROOT}/.venv/bin/activate" ] && source "${REPO_ROOT}/.venv/bin/activate"
      exec python3 "${SCRIPT_DIR}/<tool_name>.py" "$@"

  common_flags:
    - name: "--force"
      purpose: "Re-run even if the cache is current."
    - name: "--dry-run"
      purpose: "Report what would happen without writing to the cache."
    - name: "--use-mock"
      purpose: "Force offline / deterministic mode (no network). Required for tests to run without network access."
    - name: "--log-level"
      purpose: "Python logging level. Default INFO."

  dependencies:
    - "Tools MUST NOT depend on the Facetwork runtime, MongoDB, or the dashboard."
    - "HDFS / PostGIS / external APIs are fine via the storage abstraction."
    - "The ONLY required runtime deps are stdlib + the tool's domain libs (requests, osmium, etc.)."

# ---------------------------------------------------------------------------
# The _lib/ contract — the shared library behind the tools.
# ---------------------------------------------------------------------------
lib_contract:
  purpose: |
    Every tool is a thin CLI shell around one or more _lib/ functions.
    The same functions are the handler-facing API. One code path, one
    cache, one set of semantics.

  required_primitives:
    sidecar:
      path: "_lib/sidecar.py"
      role: "Per-entry cache sidecar I/O (read/write/presence/lock/listing)."
      conforms_to: "agent-spec/cache-layout.agent-spec.yaml"
    storage:
      path: "_lib/storage.py"
      role: "Backend abstraction (LocalStorage, HdfsStorage). Root-path derivation."
      conforms_to: "agent-spec/storage.agent-spec.yaml"

  module_style:
    - "One pipeline step per _lib module (download, parse, extract, build, render)."
    - "Pure/compute modules have NO I/O — e.g. the parse module is pure functions."
    - "I/O modules use sidecar + storage — never write directly to cache paths bypassing the sidecar protocol."
    - "Mocks for offline mode live in a sibling module (`_lib/<domain>_mocks.py`) and are exercised via a `use_mock` kwarg, never via import-time env detection that's hard to control in tests."

  imports:
    tool_side: "`sys.path.insert(0, str(Path(__file__).resolve().parent))` then `from _lib import <module>`. This lets the tool script run as `python tools/foo.py` without the whole tools/ tree being a Python package."
    lib_side: "Between _lib modules, use absolute imports: `from _lib import sidecar` — never relative."

# ---------------------------------------------------------------------------
# The handler contract — handlers are thin dispatchers.
# ---------------------------------------------------------------------------
handler_contract:
  thinness_rule: |
    A handler file is a registry + parameter-coercion layer. It should
    do NO domain work inline. Every substantive operation routes to a
    _lib/ function. This makes handler unit tests easy and keeps the
    CLI and FFL surfaces exercising literally the same code.

  structure:
    - "Each facet group lives in its own sub-package: `handlers/<group>/<group>_handlers.py`."
    - "Handler module exposes `handle(payload: dict) -> dict` (RegistryRunner entrypoint)."
    - "Handler module also exposes `register_handlers(runner)` for programmatic registration."
    - "All facets in the group are listed in a `_DISPATCH` dict, e.g. `{\"weather.Analysis.AnalyzeStationClimate\": handle_analyze_station_climate}`."

  calls_lib_via:
    shim: "handlers/shared/<domain>_utils.py"
    role: "A compatibility / re-export layer. Puts tools/ on sys.path, re-exports the _lib symbols the handlers use, and optionally wraps them to preserve legacy signatures."
    example: |
      # handlers/shared/<domain>_utils.py
      _TOOLS_ROOT = Path(__file__).resolve().parents[2] / "tools"
      if str(_TOOLS_ROOT) not in sys.path:
          sys.path.insert(0, str(_TOOLS_ROOT))
      from _lib.foo import bar  # noqa: E402

  stateful_deps:
    rule: |
      Side effects that require infrastructure NOT available to the tool
      (e.g. MongoDB writes, Redis state, message queues) stay in the
      handler layer — NEVER in _lib. _lib must always be runnable
      standalone from a CLI without any cluster available.
    example: |
      # _lib returns data; handler persists it to Mongo
      summaries = climate_analysis.compute_yearly_summaries(daily, ...)
      report_store.upsert_report(...)   # Mongo write — handler-only

# ---------------------------------------------------------------------------
# Cache conformance — defer to cache-layout spec for layout rules.
# ---------------------------------------------------------------------------
cache_conformance:
  defers_to: "agent-spec/cache-layout.agent-spec.yaml"
  summary:
    - "One namespace per domain: cache/<namespace>/<cache_type>/<relative_path>."
    - "Every cached artifact has a sibling <artifact>.meta.json sidecar."
    - "Writes use: stage → hash → finalize_from_local → write_sidecar (in that order)."
    - "Sidecar WRITE is the last step — readers treat missing sidecar as 'entry not present'."
    - "Overwrite contention is arbitrated with per-entry fcntl locks via sidecar.entry_lock."

  namespace_examples:
    - namespace: "osm"
      cache_types: ["pbf", "geojson", "shapefiles", "extract", "vector_tiles", "html", "graphhopper", "valhalla", "osrm"]
    - namespace: "noaa-weather"
      cache_types: ["catalog", "station-csv", "stations-discovered", "climate-summary", "region-trend", "geocode"]

# ---------------------------------------------------------------------------
# Test conformance.
# ---------------------------------------------------------------------------
tests:
  coverage_rule: |
    Every _lib module has a pytest test file. Every tool has at least a
    smoke test (import + --help). Handlers get integration-style tests
    that mock the Mongo side effects but exercise the real _lib code
    path end-to-end in offline / use_mock mode.

  offline_requirement: |
    The full suite must pass with NO network and NO MongoDB. CI uses
    `use_mock=True` or `AFL_DATA_ROOT=$TMPDIR` + deterministic mocks
    from `_lib/<domain>_mocks.py`. Tests that legitimately need live
    services are marked with `@pytest.mark.integration` and excluded
    from the default run.

  monkeypatch_anti_pattern:
    avoid: |
      Tests that monkey-patch module-level globals (e.g. `HAS_REQUESTS`,
      `_CACHE_DIR`) are brittle — they couple tests to implementation
      internals that don't exist in a refactor. Prefer env-var overrides
      (`AFL_DATA_ROOT`) and explicit `use_mock=True` kwargs.

# ---------------------------------------------------------------------------
# Creating a new domain example.
# ---------------------------------------------------------------------------
new_domain_checklist:
  step_1_scaffold:
    - "Create examples/<name>/{tools,handlers,ffl,tests}/ directories."
    - "Copy examples/osm-geocoder/tools/_lib/{sidecar,storage}.py to examples/<name>/tools/_lib/ (they are namespace-agnostic)."
    - "Add __init__.py files where needed."

  step_2_lib:
    - "Define namespace = '<name>' as a module-level constant in each _lib domain module."
    - "Pure-compute modules (parsers, analysis) — no I/O, easy to unit-test."
    - "I/O modules use sidecar + storage. Staged writes only. Never bypass the sidecar protocol."
    - "Every domain-specific download path gets a deterministic mock in _lib/<domain>_mocks.py for offline tests."

  step_3_cli:
    - "One .py + one .sh per tool. argparse in .py only."
    - "Expose --force, --dry-run (where meaningful), --use-mock, --log-level."
    - "Structured output on stdout (JSON preferred); logs on stderr."
    - "Flag-accept both positional args and --<input>-file for batch invocations, so the tool is scriptable from update-all-style wrappers."

  step_4_handlers:
    - "Each facet group: handlers/<group>/<group>_handlers.py."
    - "handlers/shared/<name>_utils.py is the sys.path shim + legacy wrappers + handler-only state (Mongo)."
    - "Handler functions: coerce params, call _lib, persist to the handler-only store, return a JSON-serializable dict."

  step_5_tests:
    - "pytest examples/<name>/tests/ must pass offline."
    - "Tests set AFL_DATA_ROOT=tmp_path and pass use_mock=True — do NOT monkey-patch _lib internals."
    - "Add smoke tests for every CLI (import + --help exit 0)."

  step_6_docs:
    - "Add examples/<name>/tools/README.md with the pipeline diagram (see osm-geocoder for the template)."
    - "Reference this spec (tools-pattern.agent-spec.yaml) and cache-layout.agent-spec.yaml in the README."

# ---------------------------------------------------------------------------
# What does NOT belong in tools/ (go elsewhere).
# ---------------------------------------------------------------------------
out_of_scope:
  - "Workflow step definitions (event facets, FFL) → examples/<name>/ffl/."
  - "Scripts that manage the Facetwork stack itself (runners, Docker, databases) → repo-root scripts/."
  - "Test fixtures or pytest helpers → examples/<name>/tests/."
  - "Anything that must run inside a Facetwork task. If it needs the runtime, it's a handler, not a tool. (The handler may still call the tool's _lib function.)"

human_docs:
  - "examples/osm-geocoder/tools/README.md — canonical reference pipeline."
  - "https://github.com/rlemke/fwh_noaa_weather/blob/main/src/noaa_weather/tools/README.md — canonical second example."
  - "docs/architecture/overview.md — how tools + handlers fit into the broader runtime."
